apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app-deployment
spec:
  replicas: 2 # You want 2 instances of your app running
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
      - name: react-app
        image: your-docker-hub-username/my-react-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: react-app-service
spec:
  type: NodePort # This exposes the app to your local browser
  selector:
    app: react-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001